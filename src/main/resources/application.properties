spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

jwt.secret=PolskaAmazonkaJwtSecretKey2026MustBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration-ms=86400000

link.validation.max-links-per-run=25
link.validation.delay-ms-between-checks=2000
link.validation.min-hours-between-checks=24

link-checker.worker.base-url=${LINK_CHECKER_WORKER_URL:http://localhost:3001}
link-checker.worker.token=${LINK_CHECKER_WORKER_TOKEN:}
link-checker.worker.connect-timeout=5s
link-checker.worker.read-timeout=45s

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:4200}
